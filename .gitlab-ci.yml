stages:
  - validate

variables:
  GIT_DEPTH: 1

validate-skills:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache grep findutils
  script:
    - echo "Validating skill structure..."
    - |
      # Check each skill directory has SKILL.md
      for skill_dir in skills/*/; do
        if [ -d "$skill_dir" ]; then
          skill_name=$(basename "$skill_dir")
          if [ ! -f "${skill_dir}SKILL.md" ]; then
            echo "ERROR: Missing SKILL.md in $skill_dir"
            exit 1
          fi
          echo "OK: $skill_name has SKILL.md"
        fi
      done
    - |
      # Validate frontmatter exists
      for skill_md in skills/*/SKILL.md; do
        if [ -f "$skill_md" ]; then
          if ! head -1 "$skill_md" | grep -q '^---$'; then
            echo "ERROR: Missing frontmatter in $skill_md"
            exit 1
          fi
          echo "OK: $skill_md has frontmatter"
        fi
      done
    - |
      # Check required fields
      for skill_md in skills/*/SKILL.md; do
        if [ -f "$skill_md" ]; then
          if ! grep -q '^name:' "$skill_md"; then
            echo "ERROR: Missing 'name' field in $skill_md"
            exit 1
          fi
          if ! grep -q '^description:' "$skill_md"; then
            echo "ERROR: Missing 'description' field in $skill_md"
            exit 1
          fi
          echo "OK: $skill_md has required fields"
        fi
      done
    - echo "All skills validated successfully!"
  rules:
    - changes:
        - skills/**/*
      when: always
    - when: manual
      allow_failure: true
